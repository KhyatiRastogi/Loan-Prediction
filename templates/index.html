<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Prediction System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:420px;
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#1d3557;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border:1px solid #4facfe;
            box-shadow:0 0 8px rgba(79,172,254,.4);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            background:#0077ff;
            color:white;
            font-size:17px;
            border-radius:8px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0056d6;
        }

        .result{
            margin-top:25px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            color:#0b8457;
        }

        .result-card{
            margin-top:25px;
            padding:20px;
            border-radius:12px;
            text-align:center;
            animation:fadeIn .5s ease;
        }

        .result-card h2{
            margin:0;
            font-size:24px;
        }

        .approved{
            background:#d4edda;
            color:#155724;
            border:2px solid #28a745;
        }

        .rejected{
            background:#f8d7da;
            color:#721c24;
            border:2px solid #dc3545;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(15px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        footer{
            text-align:center;
            margin-top:25px;
            color:#777;
            font-size:13px;
        }


    </style>
    </head>
    <body>
        <div class = "container">
        <h1>
            Loan Prediction
        </h1>
        <form action = "/predict" method = "POST">
            <label >Age</label>
            <input type = "number" name = "Age" placeholder = "Age" required><br><br>

            <label>Annual Income(₹)</label>
             <input type = "number" name = "Income" placeholder = "Income" required><br><br>

            <label>Loan Amount(₹)</label>
             <input type = "number" name = "LoanAmount" placeholder = "Loan Amount" required><br><br>

             <label>Credit Score</label>
             <input type = "number" name = "CreditScore" min="300" max="900" placeholder = "Credit Score" required><br><br>
             <button type = "submit">Predict Loan Status</button>  
        </form>
        {% if prediction_text %}
             <div class="result" {{ result_class }}>
                <h2>{{prediction_text}}</h2>
             </div>
        {% endif %}

        <footer>
            Developed using Flask & Desicion Tree
        </footer>
        </div>
    </body>
</html>
